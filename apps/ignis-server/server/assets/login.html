<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ignis — Sign in</title>
  <link rel="icon" type="image/png" href="/favicon.png"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #202020;
      color: #b3b3b3;
      font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo img {
      width: 64px;
      height: 64px;
    }
    h1 {
      text-align: center;
      font-size: 18px;
      color: #dcddde;
      margin-bottom: 24px;
      font-weight: 600;
    }
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #dcddde;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus {
      border-color: #7c5cbf;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #7c5cbf;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    button:hover { background: #6a4aaf; }
    button:disabled { opacity: 0.5; cursor: default; }
    .error {
      color: #e74c3c;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      min-height: 18px;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #555;
    }
    .footer a { color: #7c5cbf; text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/favicon.png" alt="Ignis"/>
  </div>
  <h1>Sign in to Ignis</h1>
  <form id="login-form">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus/>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required/>
    </div>
    <button type="submit" id="submit-btn">Sign in</button>
    <div class="error" id="error"></div>
  </form>
  <div class="footer">
    <a href="https://github.com/Nystik-gh/ignis" target="_blank" rel="noopener">Ignis</a> &middot; Self-hosted Obsidian
  </div>
</div>
<script>
(function () {
  var form = document.getElementById("login-form");
  var btn = document.getElementById("submit-btn");
  var error = document.getElementById("error");

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;
    btn.disabled = true;
    btn.textContent = "Signing in...";
    error.textContent = "";

    fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: username, password: password }),
    })
      .then(function (r) {
        if (r.ok) {
          // Redirect to the page they wanted, or home
          var next = new URLSearchParams(window.location.search).get("next");
          window.location.href = next || "/";
        } else {
          return r.json();
        }
      })
      .then(function (data) {
        if (data && data.error) {
          error.textContent = data.error;
        }
      })
      .catch(function (err) {
        error.textContent = "Network error";
      })
      .finally(function () {
        btn.disabled = false;
        btn.textContent = "Sign in";
      });
  });
})();
</script>
</body>
</html>
